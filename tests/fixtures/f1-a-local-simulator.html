<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>F1-A local simulator fixture</title>
  </head>
  <body>
    <main>
      <h1>F1-A local simulator fixture</h1>
      <p>synthetic response だけを使う研究用 fixture です。実 X response は含みません。</p>
      <button id="run-fetch" type="button">synthetic fetch</button>
      <button id="run-xhr" type="button">synthetic XHR</button>
      <pre id="status">未実行</pre>
    </main>
    <script>
      const status = document.querySelector("#status");
      const syntheticBody = JSON.stringify({
        data: {
          users: [
            {
              rest_id: "synthetic-user-id-value-not-for-storage",
              legacy: { screen_name: "synthetic_handle_value_not_for_storage" }
            }
          ],
          next_cursor: "synthetic-cursor-value-not-for-storage"
        }
      });

      document.querySelector("#run-fetch").addEventListener("click", async () => {
        await fetch("/synthetic-blocked?cursor=synthetic-cursor-value-not-for-storage", {
          method: "GET"
        }).catch(() => {});
        status.textContent = "synthetic fetch requested";
      });

      document.querySelector("#run-xhr").addEventListener("click", () => {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "/synthetic-muted?cursor=synthetic-cursor-value-not-for-storage");
        xhr.addEventListener("loadend", () => {
          status.textContent = `synthetic XHR ended: ${syntheticBody.length}`;
        });
        xhr.send();
      });
    </script>
  </body>
</html>
