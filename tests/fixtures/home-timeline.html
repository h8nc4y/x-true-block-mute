<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phase 1 synthetic home timeline fixture</title>
    <link rel="stylesheet" href="../../src/content/content-script.css">
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #111;
        background: #f7f9f9;
        font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 640px;
        margin: 0 auto;
        min-height: 100vh;
        background: #fff;
        border-inline: 1px solid #d7dbdc;
      }

      header,
      article,
      .fixture-controls {
        padding: 16px;
        border-bottom: 1px solid #eff3f4;
      }

      header h1 {
        margin: 0;
        font-size: 20px;
      }

      .fixture-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        min-height: 34px;
        border: 1px solid #111;
        border-radius: 8px;
        background: #111;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #fff;
        color: #111;
      }

      article {
        display: grid;
        gap: 8px;
      }

      article strong,
      article p {
        margin: 0;
      }

      .quoted {
        padding: 10px;
        border: 1px solid #d7dbdc;
        border-radius: 8px;
        color: #536471;
      }
    </style>
  </head>
  <body>
    <main role="main" data-testid="primaryColumn">
      <header>
        <h1>ホーム TL synthetic fixture</h1>
      </header>

      <section class="fixture-controls" aria-label="fixture controls">
        <button type="button" data-fixture-action="hidden">完全非表示</button>
        <button type="button" data-fixture-action="placeholder">プレースホルダ</button>
        <button type="button" data-fixture-action="off" class="secondary">オフ</button>
        <button type="button" data-fixture-action="clear" class="secondary">テストデータ削除</button>
      </section>

      <article data-testid="tweet" data-x-tbm-post-card data-user-id="phase1-safe-001" data-handle="phase1_safe">
        <strong>非対象の投稿</strong>
        <a href="/phase1_safe">@phase1_safe</a>
        <p data-fixture-label="safe-post">この投稿はどのモードでも表示されます。</p>
      </article>

      <article data-testid="tweet" data-x-tbm-post-card data-user-id="phase1-user-001" data-handle="phase1_user_id_target">
        <strong>user_id 対象の投稿</strong>
        <a href="/phase1_user_id_target">@phase1_user_id_target</a>
        <p data-fixture-label="user-id-target">この本文は placeholder モードでは表示されてはいけません。</p>
      </article>

      <article data-testid="tweet" data-x-tbm-post-card data-handle="phase1_handle_target">
        <strong>handle-only 対象の投稿</strong>
        <a href="/phase1_handle_target">@phase1_handle_target</a>
        <p data-fixture-label="handle-target">この本文も対象として処理されます。</p>
      </article>

      <article data-testid="tweet" data-x-tbm-post-card data-user-id="phase1-safe-quoted" data-handle="phase1_quote_host">
        <strong>引用を含む非対象の投稿</strong>
        <a href="/phase1_quote_host">@phase1_quote_host</a>
        <p>Phase 1 ではカード単位の最小処理を確認します。</p>
        <div class="quoted" data-user-id="phase1-user-001" data-handle="phase1_user_id_target">
          引用内の対象属性。Phase 1 では外側カードの扱いが残リスクです。
        </div>
      </article>
    </main>

    <script>
      (function () {
        "use strict";

        const stores = {
          local: {},
          sync: {}
        };
        const listeners = new Set();

        function area(name) {
          return {
            get(key, callback) {
              callback({ [key]: stores[name][key] });
            },
            set(next, callback) {
              const changes = {};
              for (const [key, value] of Object.entries(next)) {
                changes[key] = { oldValue: stores[name][key], newValue: value };
                stores[name][key] = value;
              }
              callback();
              for (const listener of listeners) {
                listener(changes, name);
              }
            }
          };
        }

        window.chrome = {
          runtime: { lastError: null },
          storage: {
            local: area("local"),
            sync: area("sync"),
            onChanged: {
              addListener(listener) {
                listeners.add(listener);
              }
            }
          }
        };
      })();
    </script>
    <script src="../../src/shared/constants.js"></script>
    <script src="../../src/research/f1-a/observation-utils.js"></script>
    <script src="../../src/storage/storage.js"></script>
    <script src="../../src/content/content-script.js"></script>
    <script>
      (function () {
        "use strict";

        const { DISPLAY_MODES, Storage } = window.XTrueBlockMute;

        async function setMode(displayMode) {
          await Storage.seedSyntheticEntries();
          await Storage.setSettings({ enabled: true, displayMode });
          await window.XTrueBlockMute.ContentScript.reloadState();
        }

        document.addEventListener("click", (event) => {
          const action = event.target.dataset.fixtureAction;
          if (!action) {
            return;
          }
          if (action === "clear") {
            Storage.clearSyntheticEntries().then(() => window.XTrueBlockMute.ContentScript.reloadState());
            return;
          }
          setMode(DISPLAY_MODES[action.toUpperCase()]);
        });
      })();
    </script>
  </body>
</html>
